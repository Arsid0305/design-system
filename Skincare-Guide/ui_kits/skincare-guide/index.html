<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Уход-протокол · UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#0f1f1a; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Manrope',sans-serif; }
  .phone-wrap { width:390px; height:844px; background:#EDF3F0; border-radius:40px; overflow:hidden; box-shadow:0 30px 80px rgba(0,0,0,0.5); position:relative; display:flex; flex-direction:column; }
  @media (max-height:900px) {
    body { align-items:flex-start; padding:20px 0; }
    .phone-wrap { transform-origin:top center; transform:scale(0.85); }
  }
</style>
</head>
<body>
<div class="phone-wrap" id="root-wrap">
  <div id="root"></div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── DESIGN TOKENS ─────────────────────────────────────────
const T = {
  sage: '#4A7C6F', sageLight: '#7BB5A4', sageDim: '#C8DDD7',
  sageBg: '#EDF3F0', cream: '#FAF6EF',
  warm: '#C8855A', warmBg: '#FEF2EA',
  dark: '#1A2E28', mid: '#3D5A52', soft: '#6B8E84',
  success: '#3A7A5E', successBg: '#EAF5F0',
  cardShadow: '0 1px 3px rgba(0,0,0,0.06)',
};

// ── PRIMITIVE COMPONENTS ──────────────────────────────────

function Badge({ children }) {
  return (
    <span style={{
      display:'inline-block',
      background:'rgba(123,181,164,0.2)',
      border:'1px solid rgba(123,181,164,0.4)',
      color:T.sageLight,
      fontFamily:"'Manrope',sans-serif",
      fontSize:10, fontWeight:700,
      letterSpacing:'1.5px',
      textTransform:'uppercase',
      padding:'5px 14px',
      borderRadius:40,
    }}>{children}</span>
  );
}

function Chip({ children, variant='default' }) {
  const styles = {
    default:  { background:T.sageBg,   color:T.mid },
    warning:  { background:T.warmBg,   color:T.warm },
    success:  { background:T.successBg, color:T.success },
  };
  return (
    <span style={{
      ...styles[variant],
      fontSize:11, fontWeight:600,
      padding:'4px 10px', borderRadius:20,
    }}>{children}</span>
  );
}

function StepIcon({ emoji }) {
  return (
    <div style={{
      width:42, height:42, borderRadius:14,
      background:T.sageBg,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:20, flexShrink:0,
    }}>{emoji}</div>
  );
}

function TimeTag({ children }) {
  return (
    <span style={{
      fontSize:11, fontWeight:700, color:T.soft,
      background:T.sageBg, padding:'4px 10px',
      borderRadius:20, flexShrink:0,
    }}>{children}</span>
  );
}

function WarnBox({ children, variant='warn' }) {
  const isWarn = variant === 'warn';
  return (
    <div style={{
      background: isWarn ? T.warmBg : T.successBg,
      color: isWarn ? T.warm : T.success,
      fontSize:11, fontWeight:600,
      padding:'6px 12px', borderRadius:12,
      marginTop:6,
    }}>{children}</div>
  );
}

// ── STEP CARD ─────────────────────────────────────────────
function StepCard({ icon, label, product, time, chips=[], warns=[], delay=0 }) {
  const [vis, setVis] = useState(false);
  useEffect(() => { const t = setTimeout(()=>setVis(true), delay); return ()=>clearTimeout(t); }, [delay]);
  return (
    <div style={{
      background:'#fff', borderRadius:20, padding:18, marginBottom:12,
      boxShadow:T.cardShadow,
      opacity: vis ? 1 : 0,
      transform: vis ? 'translateY(0)' : 'translateY(12px)',
      transition:'opacity 0.3s ease, transform 0.3s ease',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
        <StepIcon emoji={icon} />
        <div style={{ flex:1 }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:'1px', textTransform:'uppercase', color:T.sage, marginBottom:2 }}>{label}</div>
          <div style={{ fontFamily:"'Unbounded',sans-serif", fontSize:13, fontWeight:700, color:T.dark, lineHeight:1.3 }}>{product}</div>
        </div>
        <TimeTag>{time}</TimeTag>
      </div>
      {chips.length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:8 }}>
          {chips.map((c,i) => <Chip key={i}>{c}</Chip>)}
        </div>
      )}
      {warns.map((w,i) => <WarnBox key={i} variant={w.v}>{w.text}</WarnBox>)}
    </div>
  );
}

// ── ALGO CARD ─────────────────────────────────────────────
function AlgoCard({ icon, iconBg, title, steps, tip }) {
  return (
    <div style={{ background:'#fff', borderRadius:20, padding:'20px 18px', marginBottom:14, boxShadow:T.cardShadow }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
        <div style={{ width:36, height:36, borderRadius:12, background:iconBg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>{icon}</div>
        <div style={{ fontFamily:"'Unbounded',sans-serif", fontSize:14, fontWeight:700, color:T.dark }}>{title}</div>
      </div>
      <div>
        {steps.map((s,i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'9px 0', borderBottom: i<steps.length-1 ? `1px solid ${T.sageBg}` : 'none' }}>
            <div style={{ width:26, height:26, borderRadius:'50%', background:T.sage, color:'#fff', fontSize:11, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{i+1}</div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:600, color:T.dark }}>{s.name}</div>
              <div style={{ fontSize:11, color:T.soft, fontWeight:500 }}>{s.product}</div>
            </div>
          </div>
        ))}
      </div>
      {tip && <div style={{ marginTop:14, background:T.sageBg, borderRadius:12, padding:'10px 14px', fontSize:12, fontWeight:600, color:T.mid }}>{tip}</div>}
    </div>
  );
}

// ── RULES CARD ────────────────────────────────────────────
function RulesCard({ title, items, variant='default' }) {
  const isDark = variant === 'dark';
  const isWarn = variant === 'warn';
  const bg = isDark ? T.dark : isWarn ? T.warmBg : '#fff';
  const titleColor = isDark ? T.sageLight : isWarn ? T.warm : T.dark;
  const textColor = isDark ? 'rgba(255,255,255,0.8)' : isWarn ? T.warm : T.mid;
  const borderColor = isDark ? 'rgba(255,255,255,0.06)' : isWarn ? 'rgba(200,133,90,0.15)' : T.sageBg;
  const dotColor = isWarn ? T.warm : T.sage;
  return (
    <div style={{ background:bg, borderRadius:20, padding:'20px 18px', marginBottom:14, boxShadow: isDark||isWarn ? 'none' : T.cardShadow }}>
      <div style={{ fontFamily:"'Unbounded',sans-serif", fontSize:13, fontWeight:700, color:titleColor, marginBottom:14, display:'flex', alignItems:'center', gap:8 }}>{title}</div>
      {items.map((item,i) => (
        <div key={i} style={{ display:'flex', gap:12, padding:'9px 0', borderBottom: i<items.length-1 ? `1px solid ${borderColor}` : 'none', alignItems:'flex-start' }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:dotColor, flexShrink:0, marginTop:5 }}></div>
          <div style={{ fontSize:13, fontWeight:500, color:textColor, lineHeight:1.5 }} dangerouslySetInnerHTML={{__html:item}} />
        </div>
      ))}
    </div>
  );
}

// ── HEADER ────────────────────────────────────────────────
function AppHeader() {
  return (
    <div style={{ background:T.dark, padding:'52px 20px 28px', position:'relative', overflow:'hidden', flexShrink:0 }}>
      <div style={{ position:'absolute', top:-60, right:-60, width:200, height:200, borderRadius:'50%', background:'radial-gradient(circle, rgba(74,124,111,0.4) 0%, transparent 70%)' }} />
      <div style={{ position:'absolute', bottom:-30, left:20, width:120, height:120, borderRadius:'50%', background:'radial-gradient(circle, rgba(123,181,164,0.2) 0%, transparent 70%)' }} />
      <div style={{ position:'relative', zIndex:1 }}>
        <Badge>Уход-протокол · 2025</Badge>
        <h1 style={{ fontFamily:"'Unbounded',sans-serif", fontSize:26, fontWeight:900, color:'#fff', lineHeight:1.15, margin:'12px 0 10px' }}>
          ЗАЩИТА<br/><span style={{ color:T.sageLight }}>+ АНТИОКСИДАНТЫ</span>
        </h1>
        <div style={{ fontSize:13, color:'rgba(255,255,255,0.5)', fontWeight:500, letterSpacing:'0.3px' }}>контроль воспаления · минимальные слои</div>
      </div>
    </div>
  );
}

// ── NAV TABS ──────────────────────────────────────────────
function NavTabs({ tabs, active, onChange }) {
  return (
    <div style={{
      display:'flex', gap:8, padding:'16px 20px',
      overflowX:'auto', scrollbarWidth:'none',
      background:T.dark,
      borderBottom:`1px solid rgba(255,255,255,0.06)`,
      position:'sticky', top:0, zIndex:100, flexShrink:0,
    }}>
      {tabs.map(tab => (
        <button key={tab.id} onClick={() => onChange(tab.id)} style={{
          flexShrink:0, padding:'8px 16px', borderRadius:30,
          fontSize:12, fontWeight:600, border:'none', cursor:'pointer',
          whiteSpace:'nowrap',
          background: active===tab.id ? T.sage : 'rgba(255,255,255,0.06)',
          color: active===tab.id ? '#fff' : 'rgba(255,255,255,0.45)',
          transition:'all 0.2s',
        }}>{tab.label}</button>
      ))}
    </div>
  );
}

// ── SECTIONS ──────────────────────────────────────────────
function ProductsSection() {
  return (
    <div style={{ padding:'20px 16px 32px' }}>
      <StepCard icon="🧼" label="Очищение · утро (опционально)" product="Round Lab Dokdo Cleanser" time="☀️ утро"
        chips={['нужен: есть себум / SPF с вечера']}
        warns={[{text:'⚠️ Не нужен: кожа чистая или есть сухость → лишнее умывание обезвоживает', v:'warn'}]}
        delay={0} />
      <StepCard icon="🍊" label="Витамин C · утро" product="La Roche-Posay C10" time="☀️ утро"
        chips={['2–4 капли','сухая кожа (!)','пауза 2–5 мин']}
        warns={[{text:'⚠️ SPF раньше времени → скатывание + неравномерная защита', v:'warn'},{text:'⚠️ Тёмно-оранжевый цвет → выбросить (окисление)', v:'warn'}]}
        delay={50} />
      <StepCard icon="☀️" label="SPF · утро" product="LRP Anthelios UVMune 400 SPF50+" time="☀️ утро"
        chips={['1 слой → 60 сек → 2 слой','жидкая текстура']}
        warns={[{text:'⚠️ Сразу 2 пальца → стекает, попадает в глаза. Два этапа обязательно', v:'warn'}]}
        delay={100} />
      <StepCard icon="💧" label="Мицеллярка · вечер (1-й этап)" product="Мицеллярная вода" time="🌙 вечер"
        chips={['снять SPF / макияж','обязательно смыть']}
        warns={[{text:'⚠️ Не смыть → ПАВы на коже → раздражение', v:'warn'}]}
        delay={150} />
      <StepCard icon="🔬" label="Азелаиновая · вечер" product="The Ordinary Azelaic Acid 10%" time="🌙 вечер"
        chips={['пауза 5–10 мин','тонкий слой','перед кремом']}
        warns={[{text:'⚠️ Крем ПОСЛЕ → скатывание, плёнка, микровоспаления', v:'warn'},{text:'✔ Тонер перед — компенсирует отсутствие воды в формуле', v:'ok'}]}
        delay={200} />
      <StepCard icon="🧴" label="Крем · вечер" product="Round Lab Birch Juice Moisturizing Cream" time="🌙 вечер"
        chips={['лёгкий, даёт окклюзию','финальный слой']}
        warns={[{text:'⚠️ Избыток → утренние отёки', v:'warn'}]}
        delay={250} />
    </div>
  );
}

function AlgoSection() {
  return (
    <div style={{ padding:'20px 16px 32px' }}>
      <AlgoCard icon="🌞" iconBg="#FFF5E0" title="Утренний ритуал"
        steps={[
          {name:'Очищение (опционально)', product:'Round Lab Dokdo · только при себуме или SPF с вечера'},
          {name:'Витамин C', product:'LRP C10 · 2–4 капли, сухая кожа · пауза 2–5 мин'},
          {name:'Зона глаз', product:'The Ordinary Caffeine 5% · только на отёки'},
          {name:'SPF — два этапа', product:'Anthelios UVMune 400 · 1 слой → 60 сек → 2 слой'},
        ]}
        tip="💡 Крем утром убран — SPF содержит достаточно увлажняющих компонентов. Лишний слой = риск скатывания"
      />
      <AlgoCard icon="🌙" iconBg="#EEE6FA" title="Вечер — стандарт"
        steps={[
          {name:'Мицеллярка → смыть водой', product:'Снять SPF / макияж · ПАВы обязательно смыть'},
          {name:'Гель-очищение', product:'Round Lab Dokdo Cleanser'},
          {name:'Тонер (опционально)', product:'Anua Heartleaf · при ощущении сухости'},
          {name:'Крем', product:'Round Lab Birch Juice · без избытка → отёки утром'},
        ]}
        tip="🔄 Стандартный вечер: восстановление барьера, без активов"
      />
      <AlgoCard icon="🔬" iconBg={T.sageBg} title="Вечер — с азелаиновой (2–3 р/нед)"
        steps={[
          {name:'Мицеллярка → смыть · Гель', product:'Round Lab Dokdo Cleanser'},
          {name:'Пауза 5–10 мин', product:'Критично — снижает раздражение'},
          {name:'Тонер · 2 слоя', product:'Anua Heartleaf · компенсирует отсутствие воды'},
          {name:'Азелаиновая', product:'The Ordinary 10% · тонкий слой'},
          {name:'Крем', product:'Round Lab Birch Juice · финальный слой'},
        ]}
        tip="⚠️ Порядок нарушать нельзя"
      />
    </div>
  );
}

function RulesSection() {
  return (
    <div style={{ padding:'20px 16px 32px' }}>
      <RulesCard title="📌 Критические правила" items={[
        'Не вводить несколько новых средств одновременно',
        'SPF — ежедневно, включая пасмурные дни',
        'Не перегружать слоями: каждый слой — обоснование',
        'Контроль реакции: 7 дней наблюдения после введения',
        'Витамин C — только на сухую кожу',
        'Азелаиновая — строго перед кремом, не после',
      ]} />
      <RulesCard title="⏱ Ожидания по срокам" items={[
        '<strong>2–4 недели:</strong> выравнивание тона, первые признаки сияния',
        '<strong>6–8 недель:</strong> уменьшение воспалений, стабилизация барьера',
        '<strong>8–12 недель:</strong> заметное улучшение текстуры',
        '<strong>Морщины и птоз</strong> — без ретиноидов не адресуются',
      ]} />
      <div style={{ background:T.dark, borderRadius:20, padding:'20px 18px', marginBottom:14 }}>
        <div style={{ fontFamily:"'Unbounded',sans-serif", fontSize:12, fontWeight:700, color:T.sageLight, marginBottom:12 }}>🧠 Ключевое</div>
        <div style={{ fontSize:14, fontWeight:500, color:'rgba(255,255,255,0.8)', lineHeight:1.65 }}>
          <strong style={{color:'#fff'}}>Защита → антиоксиданты → контроль воспаления → минимальные слои.</strong> Реакция кожи важнее отзывов.
        </div>
      </div>
    </div>
  );
}

function RisksSection() {
  return (
    <div style={{ padding:'20px 16px 32px' }}>
      <div style={{ background:T.warmBg, borderRadius:20, padding:'20px 18px', marginBottom:14 }}>
        <div style={{ fontFamily:"'Unbounded',sans-serif", fontSize:13, fontWeight:700, color:T.warm, marginBottom:14, display:'flex', alignItems:'center', gap:8 }}>⛔ Стоп-флаги — убрать средство</div>
        {['🔥 Жжение дольше 10–15 минут','🔴 Устойчивое покраснение (&gt;30 мин)','🍂 Шелушение в сочетании с зудом','⚪ Появление закрытых комедонов','💧 Резкое усиление сухости или стянутости'].map((item,i,arr) => (
          <div key={i} style={{ display:'flex', gap:10, padding:'8px 0', borderBottom: i<arr.length-1?`1px solid rgba(200,133,90,0.15)`:'none', alignItems:'center' }}>
            <div style={{ fontSize:13, fontWeight:600, color:T.warm }} dangerouslySetInnerHTML={{__html:item}} />
          </div>
        ))}
        <div style={{ marginTop:12, paddingTop:12, borderTop:'1px solid rgba(200,133,90,0.2)', fontSize:12, color:'rgba(200,133,90,0.8)', fontWeight:500 }}>❌ При любом флаге — убрать последнее введённое средство</div>
      </div>
      <RulesCard title="⚠️ Провал-сценарии" variant="default" items={[
        '<strong>Витамин C + влажная кожа</strong> → оксидация, жжение',
        '<strong>SPF скатывается</strong> → крем слишком толстым слоем',
        '<strong>Азелаиновая после крема</strong> → барьер блокирует проникновение',
        '<strong>Несколько новых средств одновременно</strong> → реакцию не атрибутировать',
      ]} />
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('products');
  const scrollRef = useRef(null);

  const tabs = [
    { id:'products', label:'Средства' },
    { id:'algo',     label:'Алгоритм' },
    { id:'rules',    label:'Правила' },
    { id:'risks',    label:'Риски' },
  ];

  const handleTabChange = (id) => {
    setTab(id);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', width:'100%', position:'absolute', inset:0 }}>
      <AppHeader />
      <NavTabs tabs={tabs} active={tab} onChange={handleTabChange} />
      <div ref={scrollRef} style={{ flex:1, overflowY:'auto', WebkitOverflowScrolling:'touch' }}>
        {tab==='products' && <ProductsSection key="products" />}
        {tab==='algo'     && <AlgoSection key="algo" />}
        {tab==='rules'    && <RulesSection key="rules" />}
        {tab==='risks'    && <RisksSection key="risks" />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
document.getElementById('root').style.cssText = 'position:absolute;inset:0;overflow:hidden;';
</script>
</body>
</html>
