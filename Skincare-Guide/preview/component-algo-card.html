<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EDF3F0; padding:14px; font-family:'Manrope',sans-serif; }
.card { background:#fff; border-radius:20px; padding:18px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.icon { width:36px; height:36px; border-radius:12px; background:#FFF5E0; display:flex; align-items:center; justify-content:center; font-size:18px; }
.title { font-family:'Unbounded',sans-serif; font-size:13px; font-weight:700; color:#1A2E28; }
.flow-step { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid #EDF3F0; }
.flow-step:last-child { border-bottom:none; }
.num { width:26px; height:26px; border-radius:50%; background:#4A7C6F; color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.name { font-size:13px; font-weight:600; color:#1A2E28; }
.prod { font-size:11px; color:#6B8E84; font-weight:500; }
.tip { margin-top:12px; background:#EDF3F0; border-radius:12px; padding:9px 12px; font-size:11px; font-weight:600; color:#3D5A52; }
</style></head>
<body>
<div class="card">
  <div class="header">
    <div class="icon">🌞</div>
    <div class="title">Утренний ритуал</div>
  </div>
  <div class="flow-step"><div class="num">1</div><div><div class="name">Витамин C</div><div class="prod">LRP C10 · 2–4 капли · пауза 2–5 мин</div></div></div>
  <div class="flow-step"><div class="num">2</div><div><div class="name">Зона глаз</div><div class="prod">The Ordinary Caffeine 5%</div></div></div>
  <div class="flow-step"><div class="num">3</div><div><div class="name">SPF — два этапа</div><div class="prod">Anthelios UVMune 400 · 1 слой → 60 сек → 2 слой</div></div></div>
  <div class="tip">💡 Крем утром убран — SPF содержит достаточно увлажняющих компонентов</div>
</div>
</body></html>
