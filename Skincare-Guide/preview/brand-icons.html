<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EDF3F0; padding:16px; font-family:'Manrope',sans-serif; }
.label { font-size:9px; font-weight:700; color:#6B8E84; letter-spacing:1.2px; text-transform:uppercase; margin-bottom:10px; }
.icon-row { display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap; margin-bottom:16px; }
.icon-item { display:flex; flex-direction:column; align-items:center; gap:5px; }
.icon-img { border-radius:14px; }
.icon-label { font-size:9px; font-weight:600; color:#6B8E84; }
.emoji-row { display:flex; gap:8px; flex-wrap:wrap; }
.ec { background:#fff; border-radius:12px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
</style></head>
<body>
<div class="label">App Icons</div>
<div class="icon-row">
  <div class="icon-item">
    <img src="../assets/icon-192.png" width="56" height="56" class="icon-img" alt="icon-192">
    <div class="icon-label">192px</div>
  </div>
  <div class="icon-item">
    <img src="../assets/apple-touch-icon.png" width="56" height="56" class="icon-img" alt="touch-icon">
    <div class="icon-label">touch</div>
  </div>
</div>
<div class="label">Emoji Icon Set (step icons)</div>
<div class="emoji-row">
  <div class="ec">🧼</div>
  <div class="ec">🍊</div>
  <div class="ec">👁️</div>
  <div class="ec">☀️</div>
  <div class="ec">💧</div>
  <div class="ec">🔬</div>
  <div class="ec">🧴</div>
  <div class="ec">🌞</div>
  <div class="ec">🌙</div>
  <div class="ec">🧠</div>
  <div class="ec">⛔</div>
  <div class="ec">⚠️</div>
  <div class="ec">✔</div>
</div>
</body></html>
