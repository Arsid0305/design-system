<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EDF3F0; padding:14px; font-family:'Manrope',sans-serif; display:flex; flex-direction:column; gap:10px; }
.stop-card { background:#FEF2EA; border-radius:20px; padding:16px 16px 12px; }
.stop-title { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700; color:#C8855A; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.stop-item { display:flex; gap:10px; padding:7px 0; border-bottom:1px solid rgba(200,133,90,.15); align-items:center; }
.stop-item:last-child { border-bottom:none; }
.stop-text { font-size:12px; font-weight:600; color:#C8855A; }
.key-card { background:#1A2E28; border-radius:20px; padding:16px; }
.key-title { font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; color:#7BB5A4; margin-bottom:8px; }
.key-text { font-size:12px; font-weight:500; color:rgba(255,255,255,.8); line-height:1.65; }
.key-text strong { color:#fff; }
</style></head>
<body>
<div class="stop-card">
  <div class="stop-title">⛔ Стоп-флаги</div>
  <div class="stop-item"><div class="stop-text">🔥 Жжение дольше 10–15 мин</div></div>
  <div class="stop-item"><div class="stop-text">🔴 Устойчивое покраснение &gt;30 мин</div></div>
  <div class="stop-item"><div class="stop-text">💧 Резкое усиление сухости</div></div>
</div>
<div class="key-card">
  <div class="key-title">🧠 Ключевое</div>
  <div class="key-text"><strong>Защита → антиоксиданты → контроль воспаления.</strong> Реакция кожи важнее отзывов.</div>
</div>
</body></html>
