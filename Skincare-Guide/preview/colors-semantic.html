<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#fff; font-family:'Manrope',sans-serif; padding:16px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.token { border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; }
.dot { width:28px; height:28px; border-radius:8px; flex-shrink:0; }
.label { font-size:11px; font-weight:700; color:#1A2E28; }
.desc  { font-size:10px; font-weight:500; color:#6B8E84; margin-top:1px; }
</style></head>
<body>
<div class="grid">
  <div class="token" style="background:#EDF3F0"><div class="dot" style="background:#1A2E28"></div><div><div class="label">text-primary</div><div class="desc">#1A2E28 — dark</div></div></div>
  <div class="token" style="background:#EDF3F0"><div class="dot" style="background:#3D5A52"></div><div><div class="label">text-secondary</div><div class="desc">#3D5A52 — mid</div></div></div>
  <div class="token" style="background:#EDF3F0"><div class="dot" style="background:#6B8E84"></div><div><div class="label">text-muted</div><div class="desc">#6B8E84 — soft</div></div></div>
  <div class="token" style="background:#EDF3F0"><div class="dot" style="background:#4A7C6F"></div><div><div class="label">text-accent</div><div class="desc">#4A7C6F — sage</div></div></div>
  <div class="token" style="background:#FEF2EA"><div class="dot" style="background:#C8855A"></div><div><div class="label">warning</div><div class="desc">#C8855A — warm</div></div></div>
  <div class="token" style="background:#EAF5F0"><div class="dot" style="background:#3A7A5E"></div><div><div class="label">success</div><div class="desc">#3A7A5E</div></div></div>
  <div class="token" style="background:#EDF3F0"><div class="dot" style="background:#1A2E28"></div><div><div class="label">surface-dark</div><div class="desc">#1A2E28 — header bg</div></div></div>
  <div class="token" style="background:#EDF3F0"><div class="dot" style="background:#ffffff; border:1px solid #C8DDD7"></div><div><div class="label">surface</div><div class="desc">#FFF — card bg</div></div></div>
</div>
</body></html>
