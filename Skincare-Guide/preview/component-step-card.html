<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EDF3F0; padding:14px; font-family:'Manrope',sans-serif; }
.step-card { background:#fff; border-radius:20px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.step-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.step-icon { width:42px; height:42px; border-radius:14px; background:#EDF3F0; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.step-meta { flex:1; }
.step-label { font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#4A7C6F; margin-bottom:2px; }
.step-product { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700; color:#1A2E28; line-height:1.3; }
.step-time { font-size:11px; font-weight:700; color:#6B8E84; background:#EDF3F0; padding:4px 10px; border-radius:20px; flex-shrink:0; }
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.chip { background:#EDF3F0; color:#3D5A52; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }
.warn { background:#FEF2EA; color:#C8855A; font-size:11px; font-weight:600; padding:6px 12px; border-radius:12px; }
</style></head>
<body>
<div class="step-card">
  <div class="step-top">
    <div class="step-icon">🍊</div>
    <div class="step-meta">
      <div class="step-label">Витамин C · утро</div>
      <div class="step-product">La Roche-Posay C10</div>
    </div>
    <div class="step-time">☀️ утро</div>
  </div>
  <div class="chips">
    <div class="chip">2–4 капли</div>
    <div class="chip">сухая кожа (!)</div>
    <div class="chip">пауза 2–5 мин</div>
  </div>
  <div class="warn">⚠️ SPF раньше времени → скатывание + неравномерная защита</div>
</div>
</body></html>
