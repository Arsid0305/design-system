<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

.row:last-child { border-bottom:none; }
.meta { font-size:9px; font-weight:700; color:#6B8E84; letter-spacing:0.8px; text-transform:uppercase; width:90px; flex-shrink:0; }
.sample { color:#1A2E28; }
</style></head>
<body>
<div class="row"><div class="meta">700 · 13px</div><div class="sample" style="font-size:13px;font-weight:700">Витамин C · утро — 2-4 капли</div></div>
<div class="row"><div class="meta">600 · 13px</div><div class="sample" style="font-size:13px;font-weight:600">La Roche-Posay C10 · сухая кожа</div></div>
<div class="row"><div class="meta">500 · 13px</div><div class="sample" style="font-size:13px;font-weight:500;color:#3D5A52">Нанести тонкий равномерный слой, пауза 2–5 мин</div></div>
<div class="row"><div class="meta">700 · 11px</div><div class="sample" style="font-size:11px;font-weight:700;color:#4A7C6F">☀️ УТРО · ОЧИЩЕНИЕ</div></div>
<div class="row"><div class="meta">600 · 11px</div><div class="sample" style="font-size:11px;font-weight:600;color:#6B8E84">сухая кожа · пауза 2–5 мин</div></div>
<div class="row"><div class="meta">700 · 10px</div><div class="sample" style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4A7C6F">ВИТАМИН C · УТРО</div></div>
</body></html>
