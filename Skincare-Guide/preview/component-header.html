<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#EDF3F0; padding:14px; font-family:'Manrope',sans-serif; }
.header { background:#1A2E28; border-radius:20px; padding:22px 18px 18px; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-40px; right:-40px; width:140px; height:140px; border-radius:50%; background:radial-gradient(circle, rgba(74,124,111,0.4) 0%, transparent 70%); }
.header::after { content:''; position:absolute; bottom:-20px; left:10px; width:90px; height:90px; border-radius:50%; background:radial-gradient(circle, rgba(123,181,164,0.2) 0%, transparent 70%); }
.badge { display:inline-block; background:rgba(123,181,164,0.2); border:1px solid rgba(123,181,164,0.4); color:#7BB5A4; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:4px 12px; border-radius:40px; margin-bottom:10px; position:relative; z-index:1; }
h1 { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:900; color:#fff; line-height:1.15; margin-bottom:6px; position:relative; z-index:1; }
h1 span { color:#7BB5A4; }
.sub { font-size:11px; color:rgba(255,255,255,0.5); font-weight:500; position:relative; z-index:1; }
</style></head>
<body>
<div class="header">
  <div class="badge">Уход-протокол · 2025</div>
  <h1>ЗАЩИТА<br><span>+ АНТИОКСИДАНТЫ</span></h1>
  <div class="sub">контроль воспаления · минимальные слои</div>
</div>
</body></html>
