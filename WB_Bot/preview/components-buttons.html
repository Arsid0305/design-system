<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#f5f6f8;padding:20px;display:flex;flex-direction:column;gap:12px}
.title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
button{font-family:inherit;cursor:pointer}
.btn-wb{padding:13px 20px;background:linear-gradient(135deg,#a500ff,#7b00ff);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.btn-ozon{padding:13px 20px;background:linear-gradient(135deg,#005BFF,#0041CC);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.btn-ai{padding:9px 18px;background:#10A37F;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.btn-disabled{padding:13px 20px;background:#e6e8ec;color:#999;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:not-allowed}
.btn-dashed{padding:12px 16px;background:#fff;border:2px dashed #a500ff;border-radius:10px;color:#a500ff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.btn-ghost{padding:8px 10px;background:rgba(255,255,255,0.15);border:none;border-radius:8px;color:#fff;cursor:pointer;display:flex;align-items:center;background-color:#a500ff}
.seg{display:flex;background:rgba(255,255,255,0.15);border-radius:12px;padding:4px;gap:4px;background-color:#a500ff;width:fit-content}
.seg-btn{padding:6px 18px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.seg-active{background:#fff;color:#a500ff}
.seg-inactive{background:transparent;color:rgba(255,255,255,0.75)}
</style></head><body>
<div>
  <div class="title">Primary Buttons</div>
  <div class="row">
    <button class="btn-wb">↓ Загрузить отзывы с WB</button>
    <button class="btn-ozon">↓ Загрузить отзывы с Ozon</button>
  </div>
</div>
<div>
  <div class="title">AI · Disabled · Add</div>
  <div class="row">
    <button class="btn-ai">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
      Сгенерировать ИИ
    </button>
    <button class="btn-disabled">Отправить на WB</button>
    <button class="btn-dashed">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Вручную
    </button>
  </div>
</div>
<div>
  <div class="title">Platform Switcher</div>
  <div class="row">
    <div class="seg">
      <button class="seg-btn seg-active">WB</button>
      <button class="seg-btn seg-inactive">OZON</button>
    </div>
    <div class="seg" style="background-color:#005BFF">
      <button class="seg-btn seg-inactive">WB</button>
      <button class="seg-btn" style="background:#fff;color:#005BFF;padding:6px 18px;border-radius:9px;border:none;font-size:14px;font-weight:700">OZON</button>
    </div>
  </div>
</div>
</body></html>
