<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#fff;padding:20px}
.title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.icon-cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.icon-wrap{width:40px;height:40px;border-radius:10px;background:#f5f6f8;display:flex;align-items:center;justify-content:center}
.icon-name{font-size:10px;color:#bbb;text-align:center}
svg{color:#555}
</style></head><body>
<div class="title">Icon Set — Inline SVG, Stroke-based</div>
<div class="grid">
  <div class="icon-cell">
    <div class="icon-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg></div>
    <div class="icon-name">Sparkle<br>AI Generate</div>
  </div>
  <div class="icon-cell">
    <div class="icon-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
    <div class="icon-name">Settings<br>sw:1.8</div>
  </div>
  <div class="icon-cell">
    <div class="icon-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
    <div class="icon-name">Back<br>Navigate</div>
  </div>
  <div class="icon-cell">
    <div class="icon-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="icon-name">Check<br>sw:2.5</div>
  </div>
  <div class="icon-cell">
    <div class="icon-wrap"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <div class="icon-name">Plus<br>Add</div>
  </div>
  <div class="icon-cell">
    <div class="icon-wrap"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg></div>
    <div class="icon-name">Trash<br>Delete</div>
  </div>
  <div class="icon-cell">
    <div class="icon-wrap"><span style="font-size:22px;color:#ffb84d;text-shadow:0 1px 4px rgba(255,184,77,.35)">★</span></div>
    <div class="icon-name">Star<br>#ffb84d</div>
  </div>
</div>
</body></html>
