<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#fff;padding:20px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:8px;align-items:stretch}
.swatch{flex:1;border-radius:10px;padding:14px 12px;display:flex;flex-direction:column;gap:4px;min-height:80px;justify-content:flex-end}
.swatch-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:.06em}
.swatch-value{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9)}
.swatch-dark .swatch-label{color:rgba(0,0,0,0.4)}
.swatch-dark .swatch-value{color:rgba(0,0,0,0.55)}
.title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
</style></head><body>
<div class="title">WB · Wildberries</div>
<div class="row">
  <div class="swatch" style="background:linear-gradient(135deg,#a500ff,#7b00ff);flex:2">
    <div class="swatch-label">Primary Gradient</div>
    <div class="swatch-value">#a500ff → #7b00ff</div>
  </div>
  <div class="swatch" style="background:#a500ff">
    <div class="swatch-label">Accent</div>
    <div class="swatch-value">#a500ff</div>
  </div>
  <div class="swatch" style="background:#7b00ff">
    <div class="swatch-label">Accent Dark</div>
    <div class="swatch-value">#7b00ff</div>
  </div>
</div>
<div class="row">
  <div class="swatch swatch-dark" style="background:rgba(165,0,255,0.06);border:1px solid rgba(165,0,255,0.15)">
    <div class="swatch-label">Accent Tint</div>
    <div class="swatch-value">rgba(165,0,255,.06)</div>
  </div>
  <div class="swatch swatch-dark" style="background:rgba(165,0,255,0.12);border:1px solid rgba(165,0,255,0.2)">
    <div class="swatch-label">Accent Shadow</div>
    <div class="swatch-value">rgba(165,0,255,.12)</div>
  </div>
  <div class="swatch" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);background-color:#a500ff">
    <div class="swatch-label">On-Gradient</div>
    <div class="swatch-value">rgba(fff,.15)</div>
  </div>
</div>
</body></html>
