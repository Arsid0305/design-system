<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#fff;padding:20px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:6px}
.swatch{flex:1;border-radius:8px;padding:10px 10px;display:flex;flex-direction:column;gap:3px;min-height:64px;justify-content:flex-end}
.swatch-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.swatch-value{font-size:11px;font-weight:600}
.light .swatch-label,.light .swatch-value{color:rgba(0,0,0,0.4)}
.dark .swatch-label,.dark .swatch-value{color:rgba(255,255,255,0.8)}
.title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em}
</style></head><body>
<div class="title">Surfaces & Text</div>
<div class="row">
  <div class="swatch light" style="background:#f5f6f8;border:1px solid #e6e8ec"><div class="swatch-label">Page BG</div><div class="swatch-value">#f5f6f8</div></div>
  <div class="swatch light" style="background:#ffffff;border:1px solid #e6e8ec"><div class="swatch-label">Card</div><div class="swatch-value">#ffffff</div></div>
  <div class="swatch light" style="background:#fafafa;border:1px solid #e6e8ec"><div class="swatch-label">Input BG</div><div class="swatch-value">#fafafa</div></div>
  <div class="swatch light" style="background:#f9fafc;border:1px solid #e6e8ec"><div class="swatch-label">Section BG</div><div class="swatch-value">#f9fafc</div></div>
</div>
<div class="title" style="margin-top:4px">Status Colors</div>
<div class="row">
  <div class="swatch dark" style="background:#34C759"><div class="swatch-label">Success</div><div class="swatch-value">#34C759</div></div>
  <div class="swatch dark" style="background:#FF9500"><div class="swatch-label">Warning</div><div class="swatch-value">#FF9500</div></div>
  <div class="swatch dark" style="background:#FF3B30"><div class="swatch-label">Error</div><div class="swatch-value">#FF3B30</div></div>
  <div class="swatch dark" style="background:#ffb84d"><div class="swatch-label">Star</div><div class="swatch-value">#ffb84d</div></div>
</div>
<div class="title" style="margin-top:4px">Text Ramp</div>
<div class="row">
  <div class="swatch light" style="background:#1a1a1a"><div class="swatch-label" style="color:rgba(255,255,255,.5)">Primary</div><div class="swatch-value" style="color:rgba(255,255,255,.8)">#1a1a1a</div></div>
  <div class="swatch light" style="background:#666"><div class="swatch-label" style="color:rgba(255,255,255,.5)">Secondary</div><div class="swatch-value" style="color:rgba(255,255,255,.8)">#666</div></div>
  <div class="swatch light" style="background:#999;border:1px solid #e6e8ec"><div class="swatch-label" style="color:rgba(255,255,255,.6)">Muted</div><div class="swatch-value" style="color:rgba(255,255,255,.8)">#999</div></div>
  <div class="swatch light" style="background:#bbb;border:1px solid #e6e8ec"><div class="swatch-label" style="color:rgba(255,255,255,.6)">Placeholder</div><div class="swatch-value" style="color:rgba(255,255,255,.8)">#bbb</div></div>
</div>
</body></html>
