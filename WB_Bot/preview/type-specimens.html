<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#f5f6f8;padding:20px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:10px;border:1px solid #e6e8ec;padding:14px 16px}
.overline{font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.meta-row{display:flex;gap:14px;font-size:13px;color:#888}
.name{font-size:14px;color:#666;margin-bottom:2px}
.product{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:10px}
.text-block{background:#f9fafc;padding:10px 14px;border-radius:8px;font-size:15px;line-height:1.6;color:#1a1a1a}
.label-green{font-size:12px;font-weight:700;color:#34C759;margin-bottom:3px}
</style></head><body>
<div class="card">
  <div class="overline">Отзывы · 3 ожидают</div>
  <div class="name">Мария К.</div>
  <div class="product">Мяч для собак "BounceX Pro"</div>
  <div class="meta-row"><span>🏷 <b style="color:#555">251537413</b></span><span>📝 12 апр. 2025</span></div>
</div>
<div class="card">
  <div class="label-green">Достоинства</div>
  <div class="text-block">Товар пришёл быстро, упаковка целая. Собака в восторге — жуёт уже третью неделю.</div>
</div>
<div class="card">
  <div style="font-size:12px;font-weight:700;color:#FF3B30;margin-bottom:3px">Недостатки</div>
  <div class="text-block">Цвет немного отличается от фото, но в целом нормально.</div>
</div>
</body></html>
