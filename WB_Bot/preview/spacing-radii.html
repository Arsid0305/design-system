<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#fff;padding:20px;display:flex;flex-direction:column;gap:16px}
.title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.row{display:flex;gap:10px;align-items:center}
.token{font-size:11px;color:#bbb;width:80px;flex-shrink:0}
.shape{background:#a500ff;flex:1;height:32px;display:flex;align-items:center;justify-content:center}
.label{font-size:12px;font-weight:600;color:#fff}
</style></head><body>
<div>
  <div class="title">Border Radii</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div class="row"><div class="token">--radius-pill<br><span style="color:#a500ff;font-weight:700">20px</span></div><div class="shape" style="border-radius:20px"><div class="label">Pills · Badges</div></div></div>
    <div class="row"><div class="token">--radius-card<br><span style="color:#a500ff;font-weight:700">14px</span></div><div class="shape" style="border-radius:14px"><div class="label">Cards</div></div></div>
    <div class="row"><div class="token">--radius-btn<br><span style="color:#a500ff;font-weight:700">10px</span></div><div class="shape" style="border-radius:10px"><div class="label">Buttons · Inputs</div></div></div>
    <div class="row"><div class="token">--radius-seg<br><span style="color:#a500ff;font-weight:700">9px</span></div><div class="shape" style="border-radius:9px"><div class="label">Segments</div></div></div>
    <div class="row"><div class="token">--radius-icon<br><span style="color:#a500ff;font-weight:700">16px</span></div><div class="shape" style="border-radius:16px;height:40px;width:40px;flex:none"><div class="label" style="font-size:18px">💬</div></div><div style="font-size:12px;color:#bbb;margin-left:8px">App icon</div></div>
    <div class="row"><div class="token">--radius-thumb<br><span style="color:#a500ff;font-weight:700">8px</span></div><div class="shape" style="border-radius:8px;height:40px;flex:none;width:40px"></div><div style="font-size:12px;color:#bbb;margin-left:8px">Photo thumbnails</div></div>
  </div>
</div>
</body></html>
