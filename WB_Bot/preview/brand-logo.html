<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#f5f6f8;padding:20px;display:flex;gap:16px;align-items:flex-start}
.card{background:#fff;border-radius:14px;border:1px solid #e6e8ec;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;flex:1}
.label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em}
.app-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#a500ff,#7b00ff);display:flex;align-items:center;justify-content:center;font-size:28px}
</style></head><body>
<div class="card">
  <div class="label">Flat Logo</div>
  <img src="../assets/logo-flat.png" style="width:80px;height:80px;border-radius:18px">
  <div style="font-size:12px;color:#bbb">assets/logo-flat.png</div>
</div>
<div class="card">
  <div class="label">Glossy Logo</div>
  <img src="../assets/logo-glossy.png" style="width:80px;height:80px;border-radius:18px">
  <div style="font-size:12px;color:#bbb">assets/logo-glossy.png</div>
</div>
<div class="card">
  <div class="label">In-App Icon</div>
  <div class="app-icon">💬</div>
  <div style="font-size:12px;color:#bbb">56×56 · radius 16px</div>
  <div style="font-size:13px;font-weight:700;color:#1a1a1a">ReviewBot</div>
</div>
</body></html>
