<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#fff;padding:20px}
.title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.scale{display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:center;gap:10px}
.bar{background:linear-gradient(135deg,#a500ff,#7b00ff);border-radius:4px;height:12px}
.token{font-size:11px;color:#bbb;width:65px;flex-shrink:0;font-weight:600}
.val{font-size:12px;color:#a500ff;font-weight:700;width:32px}
</style></head><body>
<div class="title">Spacing Scale</div>
<div class="scale">
  <div class="row"><div class="token">--space-1</div><div class="val">4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="token">--space-2</div><div class="val">8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="token">--space-3</div><div class="val">12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="token">--space-4</div><div class="val">16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="token">--space-5</div><div class="val">20px</div><div class="bar" style="width:20px"></div></div>
  <div class="row"><div class="token">--space-6</div><div class="val">24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="token">--space-7</div><div class="val">28px</div><div class="bar" style="width:28px"></div></div>
  <div class="row"><div class="token">--space-8</div><div class="val">32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="token">--space-10</div><div class="val">40px</div><div class="bar" style="width:40px"></div></div>
  <div class="row"><div class="token">--space-12</div><div class="val">48px</div><div class="bar" style="width:48px"></div></div>
</div>
</body></html>
