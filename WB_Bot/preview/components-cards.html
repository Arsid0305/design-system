<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
body{background:#f5f6f8;padding:20px;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:14px;border:1px solid #e6e8ec;box-shadow:0 8px 24px rgba(0,0,0,0.05);padding:20px}
.badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(135deg,#a500ff,#7b00ff);margin-bottom:8px}
.name{font-size:14px;color:#666;margin-bottom:3px}
.product{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:10px}
.stars{display:flex;gap:2px;margin-bottom:12px}
.star{font-size:22px}
.text-block{background:#f9fafc;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.55;margin-bottom:8px}
.micro{font-size:12px;font-weight:700;margin-bottom:3px}
</style></head><body>
<div class="card">
  <div class="badge">WB</div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="name">Мария К.</div>
      <div class="product">Мяч для собак "BounceX Pro"</div>
      <div style="font-size:13px;color:#888;margin-bottom:10px">🏷 <b style="color:#555">251537413</b> &nbsp; 📝 12 апр. 2025</div>
    </div>
    <span style="background:rgba(52,199,89,0.1);color:#34C759;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Отвечено
    </span>
  </div>
  <div class="stars">
    <span class="star" style="color:#ffb84d">★</span><span class="star" style="color:#ffb84d">★</span><span class="star" style="color:#ffb84d">★</span><span class="star" style="color:#ffb84d">★</span><span class="star" style="color:#ffb84d">★</span>
  </div>
  <div class="text-block"><div class="micro" style="color:#34C759">Достоинства</div>Товар пришёл быстро, упаковка целая. Собака в восторге.</div>
  <div class="text-block"><div class="micro" style="color:#FF3B30">Недостатки</div>Цвет немного отличается от фото.</div>
</div>
</body></html>
