<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReviewBot — UI Kit</title>
<link rel="icon" href="../../assets/favicon.ico">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f6f8; min-height: 100vh; }
  input, textarea, button { font-family: inherit; }
  @keyframes rb-spin    { from { transform: rotate(0deg);  } to { transform: rotate(360deg); } }
  @keyframes rb-fadeIn  { from { opacity: 0; transform: translateY(8px);  } to { opacity: 1; transform: translateY(0); } }
  @keyframes rb-slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rb-pulse   { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #d0d0d8; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Shared constants (must load before components) -->
<script>
window.RB_THEMES = {
  wb: {
    grad: "linear-gradient(135deg, #a500ff, #7b00ff)",
    accent: "#a500ff",
    accentBg: "rgba(165,0,255,0.06)",
    accentShadow: "rgba(165,0,255,0.12)",
    name: "WB",
    loadLabel: "↓ Загрузить отзывы с WB",
    platform: "wb",
  },
  ozon: {
    grad: "linear-gradient(135deg, #005BFF, #0041CC)",
    accent: "#005BFF",
    accentBg: "rgba(0,91,255,0.06)",
    accentShadow: "rgba(0,91,255,0.12)",
    name: "OZON",
    loadLabel: "↓ Загрузить отзывы с Ozon",
    platform: "ozon",
  },
};

window.MOCK_REVIEWS = [
  { id: "r1", platform: "wb", source: "wb", author: "Мария К.", productName: 'Мяч для собак "BounceX Pro"', article: "251537413", date: "12 апр. 2025", stars: 5, pros: "Товар пришёл быстро, упаковка целая. Собака в восторге — жуёт уже третью неделю.", cons: "", comment: "", status: "pending" },
  { id: "r2", platform: "wb", source: "wb", author: "Алексей В.", productName: "Поводок-рулетка Light Pro", article: "189234567", date: "10 апр. 2025", stars: 3, pros: "Механизм работает плавно.", cons: "Ручка немного скользит.", comment: "В целом нормально, но хотелось бы лучше.", status: "pending" },
  { id: "r3", platform: "ozon", source: "ozon", author: "Светлана П.", productName: "Ошейник кожаный Premium", article: "321987654", date: "8 апр. 2025", stars: 2, pros: "", cons: "Запах ненатуральный, размер не соответствует.", comment: "Очень разочарована качеством.", status: "pending" },
  { id: "r4", platform: "wb", source: "wb", author: "Дмитрий О.", productName: 'Мяч для собак "BounceX Pro"', article: "251537413", date: "5 апр. 2025", stars: 5, pros: "Отличное качество! Рекомендую.", cons: "", comment: "", status: "responded" },
  { id: "r5", platform: "ozon", source: "ozon", author: "Ирина М.", productName: "Игрушка-пищалка Duck", article: "445123987", date: "3 апр. 2025", stars: 4, pros: "Ребёнок в восторге, крепкая.", cons: "Пищит немного громко.", comment: "", status: "pending" },
];
</script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="ReviewCard.jsx"></script>
<script type="text/babel" src="RespondPanel.jsx"></script>
<script type="text/babel" src="SetupForm.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const THEMES = window.RB_THEMES;

// ── Add Review Modal ──────────────────────────────────────
function AddReviewModal({ onClose, onAdd, theme }) {
  const t = theme || THEMES.wb;
  const [form, setForm] = useState({ productName: "", article: "", author: "", stars: 0, pros: "", cons: "", comment: "" });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const valid = form.productName.trim() && form.stars > 0;
  const [hoverStar, setHoverStar] = useState(0);

  const handleAdd = () => {
    if (!valid) return;
    onAdd({
      id: "manual_" + Date.now(), platform: t.platform, source: "manual",
      author: form.author.trim() || "Покупатель", productName: form.productName.trim(),
      article: form.article.trim() || "—", stars: form.stars,
      pros: form.pros.trim(), cons: form.cons.trim(), comment: form.comment.trim(),
      date: new Date().toLocaleDateString("ru-RU", { day: "numeric", month: "short", year: "numeric" }),
      status: "pending"
    });
    onClose();
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: "#fff", borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 640, maxHeight: "90vh", overflow: "auto", animation: "rb-slideUp 0.25s ease" }}>
        <div style={{ padding: "18px 24px 14px", borderBottom: "1px solid #f0f0f5", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, background: "#fff" }}>
          <div style={{ fontWeight: 700, fontSize: 17 }}>Добавить отзыв вручную</div>
          <button onClick={onClose} style={{ background: "#f0f1f4", border: "none", borderRadius: "50%", width: 32, height: 32, cursor: "pointer", fontSize: 18, color: "#666", display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
        </div>
        <div style={{ padding: "20px 24px 28px", display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#444", marginBottom: 6 }}>Название товара <span style={{ color: t.accent }}>*</span></label>
            <input style={{ width: "100%", padding: "12px 14px", border: "1.5px solid #d9dbe0", borderRadius: 10, fontSize: 15, background: "#fafafa" }}
              placeholder="Мяч для собак" value={form.productName} onChange={e => set("productName", e.target.value)} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#444", marginBottom: 6 }}>Имя покупателя</label>
            <input style={{ width: "100%", padding: "12px 14px", border: "1.5px solid #d9dbe0", borderRadius: 10, fontSize: 15, background: "#fafafa" }}
              placeholder="Мария К." value={form.author} onChange={e => set("author", e.target.value)} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#444", marginBottom: 8 }}>Оценка <span style={{ color: t.accent }}>*</span></label>
            <div style={{ display: "flex", gap: 6 }}>
              {[1,2,3,4,5].map(n => (
                <button key={n} type="button"
                  onMouseEnter={() => setHoverStar(n)} onMouseLeave={() => setHoverStar(0)}
                  onClick={() => set("stars", n)}
                  style={{ background: "none", border: "none", cursor: "pointer", padding: 2, lineHeight: 1 }}>
                  <span style={{ fontSize: 30, color: (hoverStar || form.stars) >= n ? "#ffb84d" : "#e6e6e6" }}>★</span>
                </button>
              ))}
            </div>
          </div>
          <div>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#444", marginBottom: 6 }}>Достоинства</label>
            <textarea style={{ width: "100%", padding: "12px 14px", border: "1.5px solid #d9dbe0", borderRadius: 10, fontSize: 15, background: "#fafafa", height: 72, resize: "none", lineHeight: 1.6 }}
              placeholder="Что понравилось..." value={form.pros} onChange={e => set("pros", e.target.value)} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: "#444", marginBottom: 6 }}>Недостатки</label>
            <textarea style={{ width: "100%", padding: "12px 14px", border: "1.5px solid #d9dbe0", borderRadius: 10, fontSize: 15, background: "#fafafa", height: 72, resize: "none", lineHeight: 1.6 }}
              placeholder="Что не понравилось..." value={form.cons} onChange={e => set("cons", e.target.value)} />
          </div>
          <button onClick={handleAdd} disabled={!valid}
            style={{ padding: "13px 20px", background: valid ? t.grad : "#e6e8ec", color: valid ? "#fff" : "#999", border: "none", borderRadius: 10, fontSize: 15, fontWeight: 700, cursor: valid ? "pointer" : "not-allowed", fontFamily: "inherit" }}>
            Добавить
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Review List Screen ────────────────────────────────────
function ReviewListScreen({ reviews, platform, onSelect, onDelete, onAddReview, onRefresh, onOpenSettings, onSwitchPlatform, loading }) {
  const t = THEMES[platform] || THEMES.wb;
  const [showAdd, setShowAdd] = useState(false);
  const filtered = reviews.filter(r => r.platform === platform || r.source === "manual");
  const pending = filtered.filter(r => r.status === "pending" && (r.pros || r.cons || r.comment));
  const done = filtered.filter(r => r.status === "responded");

  return (
    <div style={{ minHeight: "100vh", background: "#f5f6f8", display: "flex", flexDirection: "column" }}>
      <Header platform={platform} onSwitchPlatform={onSwitchPlatform} onOpenSettings={onOpenSettings} feedbackCount={42} />

      <div style={{ maxWidth: 700, margin: "0 auto", padding: "28px 20px", width: "100%" }}>
        <div style={{ display: "flex", gap: 12, marginBottom: 24 }}>
          <button onClick={onRefresh} disabled={loading}
            style={{ flex: 2, padding: "12px 20px", background: loading ? "#e6e8ec" : t.grad, color: loading ? "#999" : "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, transition: "all 0.15s" }}>
            {loading
              ? <><span style={{ display: "inline-block", animation: "rb-spin 1s linear infinite" }}>⟳</span>Загружаю...</>
              : t.loadLabel}
          </button>
          <button onClick={() => setShowAdd(true)}
            style={{ flex: 1, padding: "12px 16px", background: "#fff", border: `2px dashed ${t.accent}`, borderRadius: 10, color: t.accent, fontSize: 14, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Вручную
          </button>
        </div>

        {pending.length > 0 && (
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#999", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 14 }}>
              Ожидают ответа · {pending.length}
            </div>
            {pending.map(r => (
              <ReviewCard key={r.id} review={r} clickable={true}
                onSelect={onSelect} onDelete={onDelete} accentShadow={t.accentShadow} />
            ))}
          </div>
        )}

        {done.length > 0 && (
          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#999", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 14 }}>
              Отвечено · {done.length}
            </div>
            {done.map(r => (
              <ReviewCard key={r.id} review={r} clickable={false}
                onSelect={onSelect} onDelete={onDelete} accentShadow={t.accentShadow} />
            ))}
          </div>
        )}

        {pending.length === 0 && done.length === 0 && !loading && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: "#999" }}>
            <div style={{ fontSize: 44, marginBottom: 14 }}>📭</div>
            <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>Отзывов пока нет</div>
            <div style={{ fontSize: 14 }}>Нажми «{t.loadLabel.replace("↓ ", "")}» или добавь вручную</div>
          </div>
        )}
      </div>

      {showAdd && (
        <AddReviewModal
          onClose={() => setShowAdd(false)}
          onAdd={r => { onAddReview(r); setShowAdd(false); }}
          theme={t} />
      )}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────
function App() {
  const LS = {
    get: (k, fb) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } },
    set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  };

  const [screen, setScreen] = useState("loading");
  const [platform, setPlatform] = useState(() => LS.get("rb_platform", "wb"));
  const [settings, setSettings] = useState(null);
  const [reviews, setReviews] = useState([]);
  const [activeReview, setActiveReview] = useState(null);
  const [editSettings, setEditSettings] = useState(false);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    const saved = LS.get("rb_settings", null);
    const savedReviews = LS.get("rb_reviews", window.MOCK_REVIEWS);
    setReviews(savedReviews);
    if (!saved) { setScreen("setup"); return; }
    setSettings(saved);
    setScreen("list");
  }, []);

  const handleSaveSettings = (s) => {
    setSettings(s);
    LS.set("rb_settings", s);
    setEditSettings(false);
    setScreen("list");
  };

  const handleSwitchPlatform = (p) => {
    setPlatform(p);
    LS.set("rb_platform", p);
  };

  const handleRefresh = () => {
    setLoading(true);
    setTimeout(() => setLoading(false), 1400);
  };

  const handleAddReview = (r) => {
    const u = [r, ...reviews];
    setReviews(u);
    LS.set("rb_reviews", u);
  };

  const handleDeleteReview = (id) => {
    const u = reviews.filter(r => r.id !== id);
    setReviews(u);
    LS.set("rb_reviews", u);
  };

  const handleSubmit = ({ reviewId }) => {
    const u = reviews.map(r => r.id === reviewId ? { ...r, status: "responded" } : r);
    setReviews(u);
    LS.set("rb_reviews", u);
    setActiveReview(null);
    setScreen("list");
  };

  // Loading splash
  if (screen === "loading") {
    const t = THEMES[platform] || THEMES.wb;
    return (
      <div style={{ minHeight: "100vh", background: "#f5f6f8", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 56, height: 56, borderRadius: 16, background: t.grad, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px", fontSize: 28 }}>💬</div>
          <div style={{ color: "#999", fontSize: 14, animation: "rb-pulse 1.5s ease infinite" }}>Загрузка...</div>
        </div>
      </div>
    );
  }

  // Setup / edit settings
  if (screen === "setup" || editSettings) {
    return (
      <SetupForm
        initial={editSettings ? settings : null}
        isEdit={editSettings}
        onSave={handleSaveSettings}
        onBack={() => setEditSettings(false)}
        platform={platform} />
    );
  }

  // Respond screen
  if (activeReview) {
    return (
      <RespondPanel
        review={activeReview}
        settings={settings}
        onBack={() => setActiveReview(null)}
        onSubmit={handleSubmit} />
    );
  }

  // Review list
  return (
    <ReviewListScreen
      reviews={reviews}
      platform={platform}
      onSelect={r => setActiveReview(r)}
      onDelete={handleDeleteReview}
      onAddReview={handleAddReview}
      onRefresh={handleRefresh}
      onOpenSettings={() => setEditSettings(true)}
      onSwitchPlatform={handleSwitchPlatform}
      loading={loading} />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
